<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 따라쓰기 앱</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif;}
body{
margin:0;
background:#f4f7ff;
padding:20px;
display:flex;
justify-content:center;
}
.app{
width:100%;
max-width:700px;
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}
h1{color:#4f46e5;}
.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}
.menu button{
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
background:#4f46e5;
color:white;
cursor:pointer;
}
canvas{
border:4px solid #c7d2fe;
border-radius:20px;
background:white;
touch-action:none;
}
.target{
font-size:100px;
color:#d1d5db;
margin-bottom:10px;
font-weight:bold;
}
.message{
height:30px;
margin-top:10px;
font-size:20px;
font-weight:bold;
}
.success{color:green;}
.error{color:red;}
.info{color:#4f46e5;}
.controls{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
}
.controls button{
padding:12px 18px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}
.reset{background:#e5e7eb;}
.next{background:#4f46e5;color:white;}
.progress{
margin-top:15px;
font-size:18px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="app">
<h1>✏️ 한글 따라쓰기</h1>

<div class="menu">
<button onclick="changeMode('consonant')">1. 자음 따라쓰기</button>
<button onclick="changeMode('vowel')">2. 모음 따라쓰기</button>
<button onclick="changeMode('word')">3. 단어 따라쓰기</button>
<button onclick="changeMode('sentence')">4. 문장 따라쓰기</button>
</div>

<div class="target" id="targetText">ㄱ</div>
<canvas id="canvas" width="500" height="400"></canvas>
<div class="message info" id="message">획순대로 따라 써보세요!</div>

<div class="controls">
<button class="reset" onclick="resetCanvas()">다시쓰기</button>
<button class="next" onclick="nextItem()">다음</button>
</div>

<div class="progress" id="progress"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const targetText = document.getElementById('targetText');
const message = document.getElementById('message');
const progress = document.getElementById('progress');

const consonants = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const vowels = ['ㅏ','ㅑ','ㅓ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ'];
const words = ['가방','학교','바다','사과'];
const sentences = ['나는 학교에 간다','오늘은 날씨가 좋다'];

let mode = 'consonant';
let currentIndex = 0;
let currentStroke = 0;
let drawing = false;
let passed = false;

function getCurrentList(){
if(mode==='consonant') return consonants;
if(mode==='vowel') return vowels;
if(mode==='word') return words;
return sentences;
}

function getExpectedStrokes(char){
const basic={
'ㄱ':[ ['down'], ['right'] ],
'ㄴ':[ ['down'], ['right'] ],
'ㄷ':[ ['right'], ['down'], ['left'] ],
'ㄹ':[ ['right'], ['down'], ['left'], ['down'], ['right'] ],
'ㅁ':[ ['down'], ['right'], ['up'], ['left'] ],
'ㅂ':[ ['down'], ['right'], ['up'], ['left'], ['middle'] ],
'ㅅ':[ ['diag1'], ['diag2'] ],
'ㅇ':[ ['circle'] ],
'ㅈ':[ ['right'], ['diag1'], ['diag2'] ],
'ㅊ':[ ['top'], ['right'], ['diag1'], ['diag2'] ],
'ㅋ':[ ['down'], ['mid'], ['right'] ],
'ㅌ':[ ['top'], ['down'], ['middle'] ],
'ㅍ':[ ['leftdown'], ['rightdown'], ['top'], ['middle'] ],
'ㅎ':[ ['circle'], ['top'], ['middle'] ],
'ㅏ':[ ['down'], ['right'] ],
'ㅑ':[ ['down'], ['right'], ['right'] ],
'ㅓ':[ ['down'], ['left'] ],
'ㅕ':[ ['down'], ['left'], ['left'] ],
'ㅗ':[ ['downsmall'], ['right'] ],
'ㅛ':[ ['downsmall'], ['downsmall'], ['right'] ],
'ㅜ':[ ['right'], ['downsmall'] ],
'ㅠ':[ ['right'], ['downsmall'], ['downsmall'] ],
'ㅡ':[ ['right'] ],
'ㅣ':[ ['down'] ]
};
return basic[char] || [['free']];
}

function drawGuide(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.lineWidth=8;
ctx.strokeStyle='#d1d5db';
ctx.lineCap='round';

if(mode==='sentence') return;

const text = getCurrentList()[currentIndex];
ctx.font='120px Arial';
ctx.textAlign='center';
ctx.strokeText(text,250,240);
}

function updateUI(){
const list = getCurrentList();
targetText.textContent=list[currentIndex];
progress.textContent=`${currentIndex+1} / ${list.length}`;
message.textContent='획순대로 따라 써보세요!';
message.className='message info';
currentStroke=0;
passed=false;
drawGuide();
}

function changeMode(newMode){
mode=newMode;
currentIndex=0;
updateUI();
}

function getPos(e){
const rect=canvas.getBoundingClientRect();
return {
x:e.clientX-rect.left,
y:e.clientY-rect.top
};
}

let startX=0;
let startY=0;

canvas.addEventListener('pointerdown',(e)=>{
drawing=true;
const pos=getPos(e);
startX=pos.x;
startY=pos.y;
ctx.beginPath();
ctx.moveTo(pos.x,pos.y);
ctx.strokeStyle='#4f46e5';
ctx.lineWidth=8;
});

canvas.addEventListener('pointermove',(e)=>{
if(!drawing) return;
const pos=getPos(e);
ctx.lineTo(pos.x,pos.y);
ctx.stroke();
});

canvas.addEventListener('pointerup',(e)=>{
if(!drawing) return;
drawing=false;

const pos=getPos(e);
const dx=pos.x-startX;
const dy=pos.y-startY;

let detected='';

if(Math.abs(dx)>Math.abs(dy)){
detected=dx>0?'right':'left';
}else{
detected=dy>0?'down':'up';
}

if(Math.abs(dx)>40 && Math.abs(dy)>40){
detected=dx>0?'diag1':'diag2';
}

if(mode==='sentence'){
currentStroke++;
if(currentStroke>=3){
passStage();
}else{
message.textContent='순서대로 계속 써보세요!';
}
return;
}

const text=getCurrentList()[currentIndex];
const chars=text.split('');

let all=[];
chars.forEach(c=>{
all=all.concat(getExpectedStrokes(c));
});

const expected=all[currentStroke][0];

if(expected===detected || expected==='free'){
currentStroke++;
message.textContent='좋아요! 다음 획을 써보세요!';
message.className='message info';

if(currentStroke>=all.length){
passStage();
}
}else{
message.textContent='❌ 획순이 틀렸어요!';
message.className='message error';
setTimeout(resetCanvas,700);
}
});

function passStage(){
passed=true;
message.textContent='🎉 성공! 다음 단계로 이동할 수 있어요!';
message.className='message success';
}

function resetCanvas(){
currentStroke=0;
drawGuide();
message.textContent='다시 써보세요!';
message.className='message info';
}

function nextItem(){
if(!passed){
message.textContent='❌ 올바른 순서로 완료해야 넘어갈 수 있어요!';
message.className='message error';
return;
}

const list=getCurrentList();
currentIndex++;
if(currentIndex>=list.length){
currentIndex=0;
}
updateUI();
}

updateUI();
</script>
</body>
</html>
